# Runs the print-orchestrator + its Redis on the box next to your printer.
#
#   cp .env.example .env     # set OCTOPRINT_URL/KEY, SLICER_*, N8N_*
#   docker compose up -d --build
#
name: print-orchestrator

services:
  redis:
    image: redis:7-alpine
    container_name: print-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  orchestrator:
    build: .
    container_name: print-orchestrator
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      # use the bundled redis (overrides REDIS_URL from .env)
      - REDIS_URL=redis://redis:6379
    ports:
      - "4848:4848" # status dashboard
    # OCTOPRINT_URL (in .env) should be the printer's LAN address, e.g.
    # http://192.168.1.156:5000 — reachable from the container over the LAN.

volumes:
  redis_data:
